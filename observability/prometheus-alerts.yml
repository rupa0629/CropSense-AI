groups:
  - name: cropsense-api
    rules:
      - alert: CropSenseApiDown
        expr: up{job="cropsense-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: CropSense API is unavailable
      - alert: CropSenseHighErrorRate
        expr: |
          sum(rate(cropsense_requests_total{status=~"5.."}[5m]))
          /
          clamp_min(sum(rate(cropsense_requests_total[5m])), 0.001)
          > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: API 5xx rate exceeds 5%
      - alert: CropSenseSlowApiP95
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(cropsense_request_latency_seconds_bucket[10m])) by (le)
          ) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: API p95 latency exceeds two seconds
      - alert: CropSenseSlowInferenceP95
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(cropsense_inference_latency_seconds_bucket[10m])) by (le)
          ) > 8
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Model inference p95 exceeds eight seconds
      - alert: CropSenseUncertaintySpike
        expr: |
          rate(cropsense_uncertain_predictions_total[30m])
          /
          clamp_min(rate(cropsense_predictions_total[30m]), 0.001)
          > 0.45
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: More than 45% of recent predictions require review
