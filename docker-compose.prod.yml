services:
  gateway:
    image: caddy:2.8-alpine
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN to the public hostname}
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL for TLS certificate notices}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks: [cropsense-network]

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: cropsense-backend:${IMAGE_TAG:-latest}
    env_file: [.env]
    environment:
      ENVIRONMENT: production
      JWT_SECRET: ${JWT_SECRET:?Set a 64+ character JWT_SECRET}
      FRONTEND_ORIGINS: https://${DOMAIN}
      ALLOWED_HOSTS: ${DOMAIN},127.0.0.1,localhost
      FRONTEND_URL: https://${DOMAIN}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:?Set OPENWEATHER_API_KEY}
      DATABASE_URL: sqlite:////app/data/cropsense.db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
      REDIS_USE_RATE_LIMITING: "true"
      SMTP_HOST: ${SMTP_HOST:?Set SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:?Set SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?Set SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:?Set SMTP_FROM_EMAIL}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      METRICS_TOKEN: ${METRICS_TOKEN:?Set METRICS_TOKEN}
      MODEL_PATH: models/rice_disease_model.keras
      ALLOW_HEURISTIC_FALLBACKS: "false"
      FORCE_HTTPS: "false"
    expose: ["8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    volumes:
      - backend-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [cropsense-network]
    logging: &logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
    image: cropsense-frontend:${IMAGE_TAG:-latest}
    expose: ["80"]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks: [cropsense-network]
    logging: *logging

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
    restart: unless-stopped
    networks: [cropsense-network]
    logging: *logging

volumes:
  backend-data:
  redis-data:
  caddy-data:
  caddy-config:

networks:
  cropsense-network:
    driver: bridge
