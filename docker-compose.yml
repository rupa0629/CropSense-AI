version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: cropsense-backend:latest
    env_file:
      - .env
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_ORIGINS=${FRONTEND_ORIGINS}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - ENVIRONMENT=${ENVIRONMENT}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: "/api"
    image: cropsense-frontend:latest
    env_file:
      - .env
    environment:
      - VITE_API_BASE=/api
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: cropsense-net
